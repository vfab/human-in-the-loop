<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HITL Email Assistant</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --ink: #1f2937;
        --muted: #5b6470;
        --brand: #0e7490;
        --brand-2: #155e75;
        --card: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #e6f1f4 0%, var(--bg) 45%, #efe9de 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(900px, 100%);
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(17, 24, 39, 0.12);
        overflow: hidden;
      }
      header {
        background: linear-gradient(120deg, var(--brand), var(--brand-2));
        color: #fff;
        padding: 24px;
      }
      header h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      header p {
        margin: 0;
        opacity: 0.95;
      }
      main { padding: 24px; }
      form {
        display: grid;
        gap: 12px;
      }
      label {
        font-weight: 600;
        font-size: 0.95rem;
      }
      input, textarea, button {
        font: inherit;
      }
      input, textarea {
        width: 100%;
        border: 1px solid #c9d3df;
        border-radius: 10px;
        padding: 10px 12px;
      }
      textarea { min-height: 120px; resize: vertical; }
      button {
        justify-self: start;
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: wait; }
      .result {
        margin-top: 16px;
        white-space: pre-wrap;
        border: 1px solid #d6e0ea;
        background: #f9fcff;
        border-radius: 10px;
        padding: 12px;
      }
      .muted { color: var(--muted); font-size: 0.92rem; margin-top: 8px; }
    </style>
  </head>
  <body>
    <section class="card">
      <header>
        <h1>Human-in-the-Loop Email Assistant</h1>
        <p>Send a sample email payload to the deployed backend and view the generated response.</p>
      </header>
      <main>
        <form id="email-form">
          <div>
            <label for="sender">Sender</label>
            <input id="sender" name="sender" value="sam@example.com" required />
          </div>
          <div>
            <label for="subject">Subject</label>
            <input id="subject" name="subject" value="Status check" required />
          </div>
          <div>
            <label for="body">Body</label>
            <textarea id="body" name="body" required>Please provide a concise weekly status update.</textarea>
          </div>
          <button id="submit-btn" type="submit">Send to Backend</button>
        </form>
        <p class="muted">Backend endpoint: <span id="backend-url"></span></p>
        <div id="result" class="result" hidden></div>
      </main>
    </section>

    <script>
      const backendBase = "https://vfab-hitl-backend.ambitiousmoss-ad0cb2f3.eastus.azurecontainerapps.io";
      document.getElementById("backend-url").textContent = backendBase;

      const form = document.getElementById("email-form");
      const button = document.getElementById("submit-btn");
      const result = document.getElementById("result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.hidden = false;
        result.textContent = "Sending request...";
        button.disabled = true;

        const payload = {
          sender: form.sender.value,
          subject: form.subject.value,
          body: form.body.value,
        };

        try {
          const response = await fetch(`${backendBase}/run`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`HTTP ${response.status}: ${text}`);
          }

          const data = await response.json();
          result.textContent = data.response || JSON.stringify(data, null, 2);
        } catch (error) {
          result.textContent = `Request failed: ${error.message}`;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
